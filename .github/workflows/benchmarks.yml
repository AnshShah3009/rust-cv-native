name: Calibration Benchmarks

on:
  push:
    branches: [ master, main, develop ]
    paths:
      - 'stereo/src/calib3d.rs'
      - 'stereo/benches/**'
      - 'stereo/Cargo.toml'
      - '.github/workflows/benchmarks.yml'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'stereo/src/calib3d.rs'
      - 'stereo/benches/**'
      - 'stereo/Cargo.toml'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  benchmark:
    name: Run Calibration Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2

    - name: Run benchmarks
      working-directory: stereo
      run: |
        cargo bench --bench calibration_benchmark -- --sample-size 20 --verbose
      timeout-minutes: 45

    - name: Upload benchmark artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results-${{ github.run_id }}
        path: target/criterion/
        retention-days: 30
        if-no-files-found: ignore

    - name: Publish criterion report
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: actions/upload-artifact@v4
      with:
        name: criterion-html-report
        path: target/criterion/report/
        if-no-files-found: ignore

  compare-benchmarks:
    name: Compare Benchmark Results
    runs-on: ubuntu-latest
    needs: benchmark
    if: github.event_name == 'pull_request'

    steps:
    - name: Download PR benchmark results
      uses: actions/download-artifact@v4
      with:
        name: benchmark-results-${{ github.run_id }}
        path: pr_results

    - name: Create comparison report
      run: |
        echo "## Benchmark Comparison"
        echo "Results from this PR:"
        find pr_results -name "*.json" -exec head -5 {} \; 2>/dev/null || echo "No benchmark results found"
