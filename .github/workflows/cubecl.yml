name: CubeCL Backend

on:
  push:
    branches: [ feature/cubecl-backend ]
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/cubecl.yml'
  pull_request:
    branches: [ master ]
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/cubecl.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  WGPU_BACKEND: vulkan

jobs:
  cubecl-linux:
    name: CubeCL (Linux, WGPU + SwiftShader)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install Vulkan SDK and Mesa
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            vulkan-tools \
            libvulkan-dev \
            libvulkan1 \
            mesa-vulkan-drivers \
            libgl1-mesa-dev \
            libegl1 \
            libxcb-xfixes0-dev \
            wget
          echo "=== Vulkan libraries installed ==="
          dpkg -l | grep vulkan
          dpkg -l | grep mesa

      - name: Setup SwiftShader (Vulkan software renderer)
        run: |
          mkdir -p /opt/swiftshader
          cd /tmp
          # Download latest SwiftShader release
          SWIFTSHADER_URL="https://github.com/google/swiftshader/releases/download/v4.0/swiftshader-swiftshader-4.0-linux-x64.zip"
          wget -q "$SWIFTSHADER_URL" -O swiftshader.zip || {
            echo "SwiftShader download failed, using llvmpipe fallback"
            exit 0
          }
          unzip -q swiftshader.zip -d /opt/swiftshader
          chmod +x /opt/swiftshader/libvulkan.so*
          ls -la /opt/swiftshader/
          echo "=== SwiftShader installed ==="

      - name: Verify Vulkan setup
        run: |
          echo "=== Available ICD files ==="
          ls -la /usr/share/vulkan/icd.d/ || echo "No ICD directory found"
          ls -la /opt/swiftshader/*.json 2>/dev/null || echo "No SwiftShader ICD"

          echo "=== Environment ==="
          echo "WGPU_BACKEND=$WGPU_BACKEND"
          echo "VK_ICD_FILENAMES=$VK_ICD_FILENAMES"
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"

          echo "=== Vulkan info ==="
          vulkaninfo --summary 2>&1 | head -30 || echo "vulkaninfo not available"

      - name: Setup test environment
        run: |
          # Prefer SwiftShader if available, fallback to Mesa llvmpipe
          if [ -f /opt/swiftshader/vk_swiftshader.json ]; then
            export VK_ICD_FILENAMES=/opt/swiftshader/vk_swiftshader.json
            export LD_LIBRARY_PATH=/opt/swiftshader:$LD_LIBRARY_PATH
            echo "Using SwiftShader"
          else
            export VK_ICD_FILENAMES=/usr/share/vulkan/icd.d/lvp_icd.x86_64.json
            echo "Using Mesa llvmpipe"
          fi
          echo "VK_ICD_FILENAMES=$VK_ICD_FILENAMES" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: cubecl-linux-v1

      - name: Check formatting
        run: cargo fmt --all -- --check

      # ── Build checks ────────────────────────────────────────────────────
      - name: Build (default — no CubeCL)
        run: cargo build --workspace

      - name: Build (--features cubecl)
        run: cargo build --workspace --features cubecl

      # ── Clippy ──────────────────────────────────────────────────────────
      - name: Clippy (default)
        run: cargo clippy --workspace --lib -- -W clippy::all

      - name: Clippy (--features cubecl)
        run: cargo clippy --workspace --lib --features cubecl -- -W clippy::all

      # ── Tests ───────────────────────────────────────────────────────────
      - name: Tests (default workspace)
        run: cargo test --workspace
        env:
          RUST_LOG: warn

      - name: Tests (--features cubecl, cv-hal only)
        # Run sequentially to avoid GPU buffer-reuse races between tests
        # SwiftShader provides software Vulkan rendering for GPU-less CI
        run: |
          echo "=== Running CubeCL tests with software Vulkan ==="
          echo "VK_ICD_FILENAMES=$VK_ICD_FILENAMES"
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"
          cargo test --features cubecl -p cv-hal -- --test-threads=1 || {
            echo ""
            echo "=== GPU adapter detection failed ==="
            echo "This may indicate SwiftShader/llvmpipe is not properly detected."
            echo "Attempting fallback to Mesa llvmpipe..."
            export VK_ICD_FILENAMES=/usr/share/vulkan/icd.d/lvp_icd.x86_64.json
            cargo test --features cubecl -p cv-hal -- --test-threads=1
          }
        env:
          RUST_LOG: warn

      # ── Benchmark build check (no run) ──────────────────────────────────
      - name: Build benchmarks (compile check only)
        run: cargo build --features cubecl --bench cubecl_vs_wgsl

  cubecl-macos:
    name: CubeCL (macOS, Metal via WGPU)
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: cubecl-macos-v1

      # macOS GitHub runners have Metal — CubeCL WGPU uses Metal backend
      - name: Build (--features cubecl)
        run: cargo build --workspace --features cubecl

      - name: Clippy (--features cubecl)
        run: cargo clippy --workspace --lib --features cubecl -- -W clippy::all

      - name: Tests (--features cubecl, cv-hal only)
        run: cargo test --features cubecl -p cv-hal -- --test-threads=1
        env:
          RUST_LOG: warn
