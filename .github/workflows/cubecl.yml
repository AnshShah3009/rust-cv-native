name: CubeCL Research

on:
  push:
    branches: [ research/cubecl ]
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/cubecl.yml'
  pull_request:
    branches: [ master ]
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/cubecl.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  cubecl-linux:
    name: CubeCL (Linux, WGPU)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: cubecl-linux-v1

      - name: Check formatting
        run: cargo fmt --all -- --check

      # ── Build & Lint (consolidated) ──────────────────────────────────────
      - name: Build and Clippy
        run: |
          echo "=== Building (default, no CubeCL) ==="
          cargo build --workspace

          echo "=== Building (--features cubecl) ==="
          cargo build --workspace --features cubecl

          echo "=== Clippy (default) ==="
          cargo clippy --workspace --lib -- -W clippy::all

          echo "=== Clippy (--features cubecl) ==="
          cargo clippy --workspace --lib --features cubecl -- -W clippy::all

      # ── Tests ───────────────────────────────────────────────────────────
      - name: Tests (default workspace)
        run: cargo test --workspace
        env:
          RUST_LOG: warn

      - name: Tests (--features cubecl, cv-hal only)
        # Run sequentially to avoid GPU buffer-reuse races between tests.
        # GPU tests gracefully skip if no adapter is available.
        run: cargo test --features cubecl -p cv-hal -- --test-threads=1
        env:
          RUST_LOG: warn

      # ── Benchmark build check (no run) ──────────────────────────────────
      - name: Build benchmarks (compile check only)
        run: cargo build --features cubecl --bench cubecl_vs_wgsl

  cubecl-linux-gpu:
    name: CubeCL (Linux, WGPU + SwiftShader GPU)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: cubecl-linux-gpu-v1

      - name: Install Vulkan SDK and dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            vulkan-tools \
            libvulkan-dev \
            libvulkan1 \
            libgl1-mesa-dev \
            libegl1 \
            libxcb-xfixes0-dev \
            wget \
            unzip
          echo "=== Vulkan libraries installed ==="

      - name: Setup SwiftShader (Vulkan software GPU)
        run: |
          mkdir -p /opt/swiftshader
          cd /tmp
          SWIFTSHADER_URL="https://github.com/google/swiftshader/releases/download/v4.0/swiftshader-swiftshader-4.0-linux-x64.zip"
          echo "Downloading SwiftShader from: $SWIFTSHADER_URL"
          wget -q "$SWIFTSHADER_URL" -O swiftshader.zip || {
            echo "SwiftShader download failed, job will exit"
            exit 1
          }
          unzip -q swiftshader.zip -d /opt/swiftshader
          chmod +x /opt/swiftshader/libvulkan.so* || true
          ls -la /opt/swiftshader/ | head -10
          echo "SwiftShader installed successfully"

      - name: Verify SwiftShader setup
        run: |
          echo "=== SwiftShader ICD files ==="
          ls -la /opt/swiftshader/*.json 2>/dev/null || echo "No JSON ICD files found, checking alternatives..."
          echo "=== SwiftShader library files ==="
          ls -la /opt/swiftshader/libvulkan.so* 2>/dev/null || echo "No libvulkan found"
          echo "=== Environment ==="
          echo "WGPU_BACKEND=${WGPU_BACKEND:-not set}"

      - name: Build with SwiftShader
        env:
          LD_LIBRARY_PATH: /opt/swiftshader:${{ env.LD_LIBRARY_PATH }}
          VK_LAYER_PATH: /opt/swiftshader
        run: |
          echo "=== Building (--features cubecl) with SwiftShader ==="
          cargo build --workspace --features cubecl

      - name: Tests with SwiftShader GPU
        env:
          LD_LIBRARY_PATH: /opt/swiftshader:${{ env.LD_LIBRARY_PATH }}
          VK_LAYER_PATH: /opt/swiftshader
          RUST_LOG: warn
        run: |
          echo "=== Running CubeCL GPU tests with SwiftShader ==="
          cargo test --features cubecl -p cv-hal -- --test-threads=1
          echo "=== Running integration tests ==="
          cargo test --features cubecl --test spatial_perception_tests -- --test-threads=1

  cubecl-macos:
    name: CubeCL (macOS, Metal via WGPU)
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: cubecl-macos-v1

      # macOS GitHub runners have Metal — CubeCL WGPU uses Metal backend
      - name: Build and Clippy (--features cubecl)
        run: |
          echo "=== Building (--features cubecl) ==="
          cargo build --workspace --features cubecl

          echo "=== Clippy (--features cubecl) ==="
          cargo clippy --workspace --lib --features cubecl -- -W clippy::all

      - name: Tests (--features cubecl, cv-hal only)
        run: cargo test --features cubecl -p cv-hal -- --test-threads=1
        env:
          RUST_LOG: warn
