name: CubeCL Research

on:
  push:
    branches: [ research/cubecl ]
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/cubecl.yml'
  pull_request:
    branches: [ master ]
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/cubecl.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  cubecl-linux:
    name: CubeCL (Linux, WGPU)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: cubecl-linux-v1

      - name: Check formatting
        run: cargo fmt --all -- --check

      # ── Build & Lint (consolidated) ──────────────────────────────────────
      - name: Build and Clippy
        run: |
          echo "=== Building (default, no CubeCL) ==="
          cargo build --workspace

          echo "=== Building (--features cubecl) ==="
          cargo build --workspace --features cubecl

          echo "=== Clippy (default) ==="
          cargo clippy --workspace --lib -- -W clippy::all

          echo "=== Clippy (--features cubecl) ==="
          cargo clippy --workspace --lib --features cubecl -- -W clippy::all

      # ── Tests ───────────────────────────────────────────────────────────
      - name: Tests (default workspace)
        run: cargo test --workspace
        env:
          RUST_LOG: warn

      - name: Tests (--features cubecl, cv-hal only)
        # Run sequentially to avoid GPU buffer-reuse races between tests.
        # GPU tests gracefully skip if no adapter is available.
        run: cargo test --features cubecl -p cv-hal -- --test-threads=1
        env:
          RUST_LOG: warn

      # ── Benchmark build check (no run) ──────────────────────────────────
      - name: Build benchmarks (compile check only)
        run: cargo build --features cubecl --bench cubecl_vs_wgsl

  cubecl-linux-gpu:
    name: CubeCL (Linux, WGPU + Mesa llvmpipe GPU)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: cubecl-linux-gpu-v1

      - name: Install Mesa llvmpipe (Vulkan software GPU)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            libvulkan1 \
            mesa-vulkan-drivers \
            vulkan-tools
          echo "=== Mesa llvmpipe installed ==="
          echo "=== Available Vulkan ICDs ==="
          ls -la /usr/share/vulkan/icd.d/ || echo "No ICD directory"

      - name: Build with llvmpipe
        env:
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.x86_64.json
        run: |
          echo "=== Building (--features cubecl) with Mesa llvmpipe ==="
          cargo build --workspace --features cubecl

      - name: Tests with llvmpipe GPU
        env:
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.x86_64.json
          RUST_LOG: warn
        run: |
          echo "=== Running CubeCL GPU tests with Mesa llvmpipe ==="
          cargo test --features cubecl -p cv-hal -- --test-threads=1
          echo "=== Running integration tests ==="
          cargo test --features cubecl --test spatial_perception_tests -- --test-threads=1

  cubecl-macos:
    name: CubeCL (macOS, Metal via WGPU)
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: cubecl-macos-v1

      # macOS GitHub runners have Metal — CubeCL WGPU uses Metal backend
      - name: Build and Clippy (--features cubecl)
        run: |
          echo "=== Building (--features cubecl) ==="
          cargo build --workspace --features cubecl

          echo "=== Clippy (--features cubecl) ==="
          cargo clippy --workspace --lib --features cubecl -- -W clippy::all

      - name: Tests (--features cubecl, cv-hal only)
        run: cargo test --features cubecl -p cv-hal -- --test-threads=1
        env:
          RUST_LOG: warn
