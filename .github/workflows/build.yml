name: Build and Test

on:
  push:
    branches: [ master, develop ]
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ master, develop ]
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/build.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  ci-linux:
    name: CI (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        components: rustfmt, clippy

    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2

    - name: Install cargo-nextest
      uses: taiki-e/install-action@nextest

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Build workspace
      run: cargo build --workspace

    - name: Run clippy
      run: cargo clippy --workspace --lib -- -W clippy::all

    - name: Run tests
      run: cargo nextest run --workspace

  ci-macos:
    name: CI (macOS)
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        components: clippy

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2
      with:
        key: macos-v1

    - name: Install cargo-nextest
      uses: taiki-e/install-action@nextest

    - name: Build workspace (CPU backend)
      run: cargo build --workspace --features cpu

    - name: Build workspace (MLX backend)
      run: cargo build --workspace --features mlx

    - name: Run clippy
      run: cargo clippy --workspace --lib -- -W clippy::all

    - name: Run tests (CPU backend)
      run: cargo nextest run --workspace --features cpu

    - name: Run tests (MLX backend)
      run: cargo nextest run --workspace --features mlx
