[package]
name = "cv-stereo"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Stereo vision and depth estimation algorithms"

[dependencies]
cv-core = { workspace = true }
cv-imgproc = { workspace = true }
cv-calib3d = { workspace = true }
cv-hal = { workspace = true }
cv-runtime = { workspace = true }
nalgebra = { workspace = true }
rayon = { workspace = true }
image = { workspace = true }
wide = { workspace = true }
wgpu = { workspace = true, optional = true }
bytemuck = { workspace = true, features = ["derive"], optional = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros"], optional = true }

[dev-dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
criterion = { workspace = true }

[[bench]]
name = "calibration_benchmark"
harness = false

[features]
default = []
gpu = ["wgpu", "bytemuck", "tokio"]
